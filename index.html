<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #FFF6E5; }
  body {
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 1.75rem 1rem 2.5rem;
  }
  .page { width: 100%; max-width: 420px; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .emojis { font-size: 30px; line-height: 1; margin-bottom: 8px; }
  h1 {
    font-family: 'Suez One', serif;
    font-weight: 400;
    font-size: 28px;
    color: #2E7B6E;
    margin: 0 0 8px;
  }
  .subtitle { font-size: 15px; color: #A9713D; margin: 0; line-height: 1.7; }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px 14px;
    margin-top: 1.5rem;
  }
  .card {
    display: block;
    text-decoration: none;
    background: #fff;
    border-radius: 8px;
    padding: 8px 8px 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    transition: transform 0.15s ease;
  }
  .card:active { transform: scale(0.96) rotate(0deg) !important; }
  .tape {
    display: block;
    height: 5px;
    width: 42px;
    margin: 0 auto 8px;
    border-radius: 2px;
    opacity: 0.85;
  }
  .card img {
    display: block;
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    border-radius: 6px;
  }
  .cname {
    display: block;
    font-family: 'Suez One', serif;
    font-size: 15px;
    color: #3A3A3A;
    margin-top: 10px;
    text-align: center;
  }
  .cdate {
    display: block;
    font-size: 11px;
    color: #999;
    margin-top: 2px;
    text-align: center;
  }
  footer {
    text-align: center;
    font-family: 'Suez One', serif;
    font-size: 14px;
    color: #D4557A;
    margin-top: 2.25rem;
  }
</style>

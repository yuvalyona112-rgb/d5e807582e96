<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>מזל טוב לירני</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Heebo:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #FFF6E5; }
  body {
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 1.75rem 1rem 2.5rem;
  }
  .page { width: 100%; max-width: 420px; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .emojis { font-size: 30px; line-height: 1; margin-bottom: 8px; }
  h1 {
    font-family: 'Suez One', serif;
    font-weight: 400;
    font-size: 28px;
    color: #2E7B6E;
    margin: 0 0 8px;
  }
  .subtitle { font-size: 15px; color: #A9713D; margin: 0; line-height: 1.7; }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px 14px;
    margin-top: 1.5rem;
  }
  .card {
    display: block;
    text-decoration: none;
    background: #fff;
    border-radius: 8px;
    padding: 8px 8px 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    transition: transform 0.15s ease;
  }
  .card:active { transform: scale(0.96) rotate(0deg) !important; }
  .tape {
    display: block;
    height: 5px;
    width: 42px;
    margin: 0 auto 8px;
    border-radius: 2px;
    opacity: 0.85;
  }
  .card img {
    display: block;
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    border-radius: 6px;
    background: #F0E4D3;
  }
  .cname {
    display: block;
    font-family: 'Suez One', serif;
    font-size: 15px;
    color: #3A3A3A;
    margin-top: 10px;
    text-align: center;
  }
  .cdate {
    display: block;
    font-size: 11px;
    color: #999;
    margin-top: 2px;
    text-align: center;
  }
  footer {
    text-align: center;
    font-family: 'Suez One', serif;
    font-size: 14px;
    color: #D4557A;
    margin-top: 2.25rem;
  }
</style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="emojis">🎂🎉💛</div>
      <h1>מזל טוב לירני שלי! 🥳</h1>
      <p class="subtitle">21 ✨<br>4 חודשים ביחד במזרח 💕</p>
    </div>
    <div class="grid">
    <a class="card" href="https://photos.app.goo.gl/Gu2RVA3VWnHbSiYF7" target="_blank" rel="noopener" style="transform: rotate(-2deg);">
      <span class="tape" style="background:#E3927A;"></span>
      <img src="photos/באנגקוק.jpg" alt="באנגקוק" loading="lazy">
      <span class="cname">באנגקוק</span>
      <span class="cdate">Jan 27 – Feb 1</span>
    </a>
    <a class="card" href="https://photos.app.goo.gl/fEfG7QAi9RoX4bpW7" target="_blank" rel="noopener" style="transform: rotate(1.5deg);">
      <span class="tape" style="background:#5AA8A0;"></span>
      <img src="photos/קראבי.jpg" alt="קראבי" loading="lazy">
      <span class="cname">קראבי</span>
      <span class="cdate">Feb 1 – 3</span>
    </a>
    <a class="card" href="https://photos.app.goo.gl/FWwGGTvHmtwt6tp9A" target="_blank" rel="noopener" style="transform: rotate(-2deg);">
      <span class="tape" style="background:#E0B84E;"></span>
      <img src="photos/קופיפי.jpg" alt="קופיפי" loading="lazy">
      <span class="cname">קופיפי</span>
      <span class="cdate">Feb 4 – 6</span>
    </a>
    <a class="card" href="https://photos.app.goo.gl/mf7gBhgU7rKHriW6A" target="_blank" rel="noopener" style="transform: rotate(1.5deg);">
      <span class="tape" style="background:#D4557A;"></span>
      <img src="photos/קוסמוי.jpg" alt="קוסמוי" loading="lazy">
      <span class="cname">קוסמוי</span>
      <span class="cdate">Feb 11, 2014 – Feb 11, 2026</span>
    </a>
    <a class="card" href="https://photos.app.goo.gl/RuyWUHhLi9HXA4sJ6" target="_blank" rel="noopener" style="transform: rotate(-2deg);">
      <span class="tape" style="background:#E3927A;"></span>
      <img src="photos/לאוס.jpg" alt="לאוס" loading="lazy">
      <span class="cname">לאוס</span>
      <span class="cdate">Feb 13 – 28</span>
    </a>
    <a class="card" href="https://photos.app.goo.gl/4oBhu6GKNvEjtivD9" target="_blank" rel="noopener" style="transform: rotate(1.5deg);">
      <span class="tape" style="background:#5AA8A0;"></span>
      <img src="photos/סרי לנקה.jpg" alt="סרי לנקה" loading="lazy">
      <span class="cname">סרי לנקה</span>
      <span class="cdate">Mar 2 – 17</span>
    </a>
    <a class="card" href="https://photos.app.goo.gl/umNFeaA9h4ujqXZ39" target="_blank" rel="noopener" style="transform: rotate(-2deg);">
      <span class="tape" style="background:#E0B84E;"></span>
      <img src="photos/ויאטנם.jpg" alt="ויאטנם" loading="lazy">
      <span class="cname">ויאטנם</span>
      <span class="cdate">Mar 18 – Apr 23</span>
    </a>
    <a class="card" href="https://photos.app.goo.gl/Rdec5UqZz3jQYxyz9" target="_blank" rel="noopener" style="transform: rotate(1.5deg);">
      <span class="tape" style="background:#D4557A;"></span>
      <img src="photos/פיליפינים.jpg" alt="פיליפינים" loading="lazy">
      <span class="cname">פיליפינים</span>
      <span class="cdate">Apr 24 – May 24</span>
    </a>
    </div>
    <footer>נעשה באהבה 💛, על כל קילומטר שעברנו יחד</footer>
  </div>
</body>
</html>
